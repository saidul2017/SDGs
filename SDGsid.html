<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDGs Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>SDGs National Dashboard</h1>
    <div id="chartContainer">
        <canvas id="sdgChart"></canvas>
    </div>
    <script>
        async function loadJSON(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.warn(`Failed to load ${url}: `, error);
                return null;  // Return null if the file is not found
            }
        }

        async function init() {
            const nationalData = await loadJSON('./data/sdg-national.json');
            const nationalMetrics = await loadJSON('./data/national_sdg_metrics.json');

            if (nationalData) {
                // Load and render the national data chart
                renderChart(nationalData);
            } else {
                console.error('National data is not available.');
                // Optionally handle the case where national data is missing
            }

            if (nationalMetrics) {
                // Process national metrics and update the UI accordingly
                updateMetricsUI(nationalMetrics);
            } else {
                console.warn('National metrics data is not available. Falling back to defaults.');
                // Implement fallback logic for metrics
                setDefaultMetricsUI();
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('sdgChart').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'SDG Data',
                        data: data.values,
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1,
                    }],
                },
                options: {
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        function updateMetricsUI(metrics) {
            // Update the dashboard with the provided metrics
        }

        function setDefaultMetricsUI() {
            // Set default values when metrics are not available
        }

        // Initialization
        init();
    </script>
</body>
</html>
